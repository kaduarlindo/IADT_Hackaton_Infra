version: '3.8'

services:
  # LocalStack - Emulador AWS local
  localstack:
    image: localstack/localstack:latest
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,dynamodb,lambda,apigateway,iam,logs,sts
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - LAMBDA_EXECUTOR=docker
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - "${TMPDIR:-/tmp}/localstack:/tmp/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - hackaton-network

  # DynamoDB Local (alternativa)
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb"
    networks:
      - hackaton-network

  # S3 Local (MinIO)
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-storage:/data
    networks:
      - hackaton-network

  # Backend API (SAM Local)
  backend:
    image: python:3.11
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
      - DYNAMODB_TABLE_NAME=hackaton-documents
      - S3_BUCKET_NAME=hackaton-uploads
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/app
    command: >
      bash -c "
      pip install -r src/requirements-dev.txt &&
      pip install aws-sam-cli &&
      sam local start-api --host 0.0.0.0 --port 3000
      "
    depends_on:
      - localstack
      - dynamodb-local
      - minio
    networks:
      - hackaton-network

  # Frontend React (Dev Server)
  frontend:
    image: node:18-alpine
    working_dir: /app/frontend
    ports:
      - "3001:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:3000
    volumes:
      - ./frontend:/app/frontend
    command: npm start
    depends_on:
      - backend
    networks:
      - hackaton-network

volumes:
  minio-storage:

networks:
  hackaton-network:
    driver: bridge
